name: CCIRS CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: npm
          # cache-dependency-path: package-lock.json
      - name: Install backend deps
        run: npm ci
      - name: Build backend
        run: npm run build
      - name: Test backend
        run: npm test -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend
      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
